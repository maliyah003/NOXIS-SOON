    <!-- Client-side Interactive Logic -->
    <script>
        // Setup Loader Animation
        const trace = document.getElementById('trace');
        if (trace) {
            const length = trace.getTotalLength();
            trace.style.strokeDasharray = length;
            trace.style.setProperty('--path-length', length);
            trace.style.strokeDashoffset = length;
        }

        // Hide Loader on Window Load
        window.addEventListener('load', () => {
            const loader = document.getElementById('loader-overlay');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                }, 500);
            }
        });

        // Add visual tracking of mouse cursor on desktop for custom glowing lights
        document.addEventListener('mousemove', (e) => {
            const glowPurple = document.getElementById('glowPurple');
            const glowBlue = document.getElementById('glowBlue');

            if (glowPurple && glowBlue) {
                const x = e.clientX;
                const y = e.clientY;

                // Smoothly shift glow spots based on mouse location
                glowPurple.style.transform = `translate(${x * 0.05}px, ${y * 0.05}px)`;
                glowBlue.style.transform = `translate(${-x * 0.03}px, ${-y * 0.03}px)`;
            }
        });
    </script>
